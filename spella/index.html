<!DOCTYPE html>
<html>
<head>
  <meta http-equiv='Content-Type' content='text/html; charset=utf-8'>
  <title>Approximate string match demo</title>
  <script src='./dist/spella.js'></script>
  <link rel='stylesheet' type='text/css' href='./css/sample.css'/>
  <script>
  function init_spella(){
      var input = document.getElementById('input');
      var output = document.getElementById('output');
      input.value = '';
      input.placeholder = 'Input a word here (like "immortan")';
      spella.bind(input, output);
  }
  </script>
  <style>
  .spella-input {
    width: 240px;
    padding: 5px;
  }

  .spella-output {
    border: 1px solid #333;
    background-color: #fff;
    margin-top: 5px;
    min-height: 20px;
    max-height: 250px;
    width: 250px;
    font-size: 0.9em;
    overflow-y: auto;
  }

  .spella-output ul {
    list-style-type: none;
    margin: 0.5em;
    padding: 0;
  }
  </style>
</head>
<body lang='en' onload='init_spella()'>
  <h1>Approximate string match demo</h1>
  <p>Search for similar words in 4.8k words dictionary using <a href='https://github.com/fujimotos/fastcomp/'>fastcomp</a>.</p>
  <p>(Source code: <a href='http://github.com/fujimotos/spella/'>http://github.com/fujimotos/spella/</a>)
  <p>For the meaning of the output values, please <a href='img/spella_screenshot.png'>see this</a>.
  <div>
    <input id='input' type='text' class='spella-input'></input>
    <div id='output' class='spella-output'></div>
  </div>
</body>
</html>
