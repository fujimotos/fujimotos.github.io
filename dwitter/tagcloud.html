a {text-decoration:none;}
#tags a {display:inline-block;border:1px solid #666;margin:4px 5px;padding:3px 7px;background:#fcfcfc;color:#333;font-size:0.9em;}
#tags a:hover {outline:none;color:#a00;border-color:#a00;background:#fffcfc;}
#tags a:focus {outline:none;color:#a00;border-color:#a00;background:#fffcfc;}
#tags a:hover span {color:#a00;}
#tags a:focus span {color:#a00;}
#tags a span {font-size:0.75em;display:inline-block;margin-left:5px;color:#555;}

<body lang='en'>
<h1>Dwitter Tag Cloud Demo (@2018-05-12 22:30)</h1>
<p>
<input autofocus placeholder='Find your favorite tags! (forward match)' autocomplete=off id='q' type='text'>
<button id='clear'>Clear</button>
</p>
<div id='tags'></div>
<script>
var $input = document.querySelector('#q');
var $tags = document.querySelector('#tags');
var $clear = document.querySelector('#clear');

var render = function() {
  var res = []
  var query = $input.value.trim().toLowerCase();
  for (var i = 0; i < HASHTAGS.length; i++) {
    var count = HASHTAGS[i][0];
    var tag = HASHTAGS[i][1];
    if (tag.toLowerCase().indexOf(query) == 0)
      res.push(`<a target='_blank' href='https://dwitter.net/h/${tag}'>${tag}<span>x${count}</span></a>`);
  }
  tags.innerHTML = res.join('')
};

$clear.onclick = (e) => {$input.value='';render()};
$input.oninput = (e) => render();
window.onload = (e) => render();
