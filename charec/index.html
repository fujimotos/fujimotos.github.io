<!DOCTYPE html>
<html>
<head>
  <meta http-equiv='Content-Type' content='text/html; charset=utf-8'>
  <title>Handwriting recognition demo</title>
  <link rel='stylesheet' type='text/css' href='../css/standard.css'>
  <script src='./dist/charec.js'></script>
  <script>
    window.addEventListener('load', function(){
      var canvas = document.getElementById('board');
      var output = document.getElementById('output');
      charec.bind(canvas, output);
    });
  </script>
  <style>
    canvas {
      border: 2px solid #777;
      display: inline-block;
    }
    div#output {
      height: 350px;
      width: 350px;
      display: inline-block;
      margin-left: 15px;
      vertical-align: top;
      text-align: center;
      font-size: 300px;
    }
  </style>
</head>
<body lang='en'>

<h1>Charec: Handwriting recognition demo</h1>
<p>A program to recognize handwritten characters, written in pure JavaScript.
<p>Please draw a single numric character (1 - 9) on the box below:

<div>
  <canvas id='board' height=350 width=350></canvas>
  <div id='output'></div>
</div>

<p>Note: For the algorithm behind this demo, go to the
<a href='https://github.com/fujimotos/charec'>project page</a>.

</body>
</html>
